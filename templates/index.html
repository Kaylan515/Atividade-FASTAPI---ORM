<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadinho da Esquina</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* HEADER */
        header {
            background-color: #2ecc71;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* MENU */
        nav {
            background-color: #27ae60;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            background-color: #1e8449;
        }

        /* CONTEÚDO */
        .container {
            padding: 20px;
            text-align: center;
        }

        .placeholder {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            color: #777;
        }

        /* FOOTER */
        footer {
            background-color: #2ecc71;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🛒 Mercadinho da Esquina</h1>
        <p>Os melhores produtos perto de você!</p>
    </header>

    <nav>
        <a href="/">Início</a>
        <a href="/produtos/cadastro">Cadastrar Produto</a>
        <a href="/listar_produtos">Listar Produtos</a>
        <a href="/categorias/cadastro">Cadastrar Categoria</a>
        <a href="/listar_categorias">Listar Categorias</a>
    </nav>

    <div class="container">
        <h2>Produtos em breve</h2>

        <div class="placeholder">
            <p>Aqui aparecerão os produtos do mercado.</p>
            <p>Você poderá adicionar, editar e listar itens futuramente.</p>
        </div>
    </div>

    <footer>
        <p>© 2026 Mercadinho da Esquina</p>
    </footer>

</body>
</html>
