<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Produto</title>

<style>
    body {
        font-family: Arial;
        background: #2ecc71;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 10px;
        width: 350px;
    }

    h1 {
        text-align: center;
        color: #27ae60;
    }

    label {
        margin-top: 10px;
        display: block;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: #2ecc71;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #27ae60;
    }
</style>
</head>
<body>

<div class="card">
    <h1>Cadastro</h1>

    <form action="/produtos" method="post">

    <label>Nome</label>
    <input type="text" name="nome" required>

    <label>Preço</label>
    <input type="number" step="0.01" name="preco" required>

    <label>Estoque</label>
    <input type="number" name="estoque" required>

    <label>Categoria</label>
    <select name="categoria_id" required>
        <option value="">Selecione uma categoria</option>

        {% for categoria in categorias %}
            <option value="{{ categoria.id }}">
                {{ categoria.nome }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Cadastrar</button>

</form>
</div>

</body>
</html>
