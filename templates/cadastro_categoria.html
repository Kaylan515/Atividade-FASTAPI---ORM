<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Categoria</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #2ecc71, #27ae60);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    h1 {
        text-align: center;
        color: #2ecc71;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    input:focus {
        border-color: #2ecc71;
        outline: none;
        box-shadow: 0 0 5px rgba(46, 204, 113, 0.5);
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background-color: #2ecc71;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #27ae60;
    }

    .links {
        margin-top: 15px;
        text-align: center;
    }

    .links a {
        display: block;
        text-decoration: none;
        color: #2ecc71;
        margin-top: 5px;
    }

    .links a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="card">
    <h1>📂 Nova Categoria</h1>

    <form action="/categorias" method="post">
        <label>Nome da Categoria</label>
        <input type="text" name="nome" placeholder="Ex: Bebidas" required>

        <label>Descrição</label>
        <input type="text" name="descricao" placeholder="Ex: Produtos líquidos">

        <button type="submit">Cadastrar</button>
    </form>

    <div class="links">
        <a href="/listar_categorias">Ver categorias</a>
        <a href="/">Voltar ao início</a>
    </div>
</div>

</body>
</html>
